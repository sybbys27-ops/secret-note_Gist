<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Secret Note (Encrypted)</title>
  <style>
    :root{
      --bg:#0f1115;
      --panel:#151924;
      --panel2:#10131b;
      --text:#e9edf5;
      --muted:#aab3c5;
      --line:#2a3142;
      --accent:#7aa2ff;
      --danger:#ff6b6b;
      --ok:#4dd4ac;
      --font: 14px; /* ✅ 보통보다 아주 조금 작게 */
      --radius: 12px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:linear-gradient(180deg,var(--bg),#0b0d12);
      color:var(--text);
      font: var(--font)/1.45 system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }
    .app{
      max-width: 1200px;
      margin: 18px auto;
      padding: 14px;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding: 12px 14px;
      background: rgba(21,25,36,0.9);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      backdrop-filter: blur(8px);
    }
    .brand{
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .brand .t{
      font-weight:700;
      letter-spacing:0.2px;
    }
    .brand .s{
      color:var(--muted);
      font-size:12px;
    }
    .row{ display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    input[type="password"], input[type="text"], textarea, select{
      background: var(--panel2);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 10px;
      outline:none;
    }
    input[type="password"], input[type="text"]{ height: 38px; }
    textarea{
      width:100%;
      min-height: 180px;
      resize: vertical;
      padding: 10px 12px;
    }
    select{ height:38px; }
    .btn{
      border: 1px solid var(--line);
      background: #1a2030;
      color: var(--text);
      padding: 9px 12px;
      border-radius: 10px;
      cursor:pointer;
      user-select:none;
    }
    .btn:hover{ border-color:#3a4663; }
    .btn.primary{ border-color: rgba(122,162,255,0.6); }
    .btn.danger{ border-color: rgba(255,107,107,0.6); }
    .btn.ok{ border-color: rgba(77,212,172,0.6); }
    .btn:disabled{
      opacity:0.5; cursor:not-allowed;
    }
    .pill{
      padding: 6px 10px;
      border: 1px solid var(--line);
      background: rgba(16,19,27,0.6);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
    }
    .main{
      display:grid;
      grid-template-columns: 320px 1fr;
      gap: 12px;
      margin-top: 12px;
    }
    @media (max-width: 920px){
      .main{ grid-template-columns: 1fr; }
    }
    .panel{
      border: 1px solid var(--line);
      background: rgba(21,25,36,0.85);
      border-radius: var(--radius);
      padding: 12px;
    }
    .panel h2{
      margin:0 0 10px 0;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing:0.2px;
    }
    .listbox{
      width:100%;
      height: 520px; /* ✅ 많이 보이게 */
      padding: 8px;
      border-radius: 12px;
      background: var(--panel2);
      border: 1px solid var(--line);
      color: var(--text);
      outline:none;
    }
    .meta{
      display:flex; gap:8px; flex-wrap:wrap; align-items:center;
      margin-bottom: 10px;
    }
    .split{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .hint{
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
    }
    .twoCol{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 920px){
      .twoCol{ grid-template-columns: 1fr; }
    }
    .toast{
      position: fixed;
      right: 14px;
      bottom: 14px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: rgba(21,25,36,0.95);
      border-radius: 12px;
      color: var(--text);
      font-size: 12px;
      opacity:0;
      transform: translateY(10px);
      transition: all 180ms ease;
      pointer-events:none;
      max-width: 340px;
    }
    .toast.show{
      opacity:1;
      transform: translateY(0px);
    }
    .dangerText{ color: var(--danger); }
    .okText{ color: var(--ok); }
    .muted{ color: var(--muted); }
    .kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      padding: 2px 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(16,19,27,0.7);
      color: var(--muted);
    }

#viewArea {
  min-height: 45vh;
  max-height: 60vh;
}

#bodyIn {
  min-height: 30vh;   /* 기본 높이 */
  max-height: 50vh;   /* 너무 커지지 않게 */
}


/* 입력 영역: 제목칸을 더 길게, 저장버튼 영역은 좁게 */
.twoCol {
  grid-template-columns: 1fr 110px;  /* 기존 1fr 1fr 대신 */
  align-items: center;
}

/* 제목 입력칸이 가로를 꽉 쓰도록 */
#titleIn {
  width: 100%;
}


  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="t">Secret Note</div>
        <div class="s">평문 0, 암호문만 저장 (AES-GCM + PBKDF2)</div>
      </div>

      <div class="row">
        <input id="pw" type="password" placeholder="비밀번호" autocomplete="current-password" />
        <button id="unlockBtn" class="btn primary">잠금 해제</button>
        <span id="lockState" class="pill">LOCKED</span>
      </div>
    </div>

    <div class="main">
      <!-- LEFT: LIST -->
      <div class="panel">
        <h2>목록</h2>
        <div class="meta">
          <select id="sortSel" title="정렬">
            <option value="pinned_updated">핀 우선 · 최근 수정순</option>
            <option value="updated">최근 수정순</option>
            <option value="title">이름순(가나다)</option>
          </select>
          <button id="pinToggleBtn" class="btn" disabled>⭐ 핀 토글</button>
          <button id="newBtn" class="btn" disabled>+ 새 항목</button>
        </div>

        <select id="list" class="listbox" size="20" disabled></select>

        <div class="meta" style="margin-top:10px;">
          <button id="exportBtn" class="btn" disabled>내보내기</button>
          <label class="btn" style="display:inline-flex; align-items:center; gap:8px; cursor:pointer;">
            불러오기
            <input id="importFile" type="file" accept="application/json" style="display:none;" />
          </label>
          <button id="clearLocalBtn" class="btn danger" disabled>로컬 데이터 삭제</button>
        </div>

        <div class="hint">
          - 목록이 많아지면 제목에 접두어 추천: <span class="kbd">일정/</span> <span class="kbd">메모/</span> <span class="kbd">실험/</span><br/>
          - 내보내기 파일은 암호문입니다. 비밀번호 없으면 의미가 없습니다.
        </div>
      </div>

      <!-- RIGHT: VIEW + EDIT -->
      <div class="panel">
        <h2>확인</h2>
        <div class="meta">
          <span class="pill">선택 항목: <span id="selTitle" class="muted">없음</span></span>
          <button id="copyBtn" class="btn" disabled>복사</button>
          <button id="editBtn" class="btn" disabled>수정</button>
          <button id="deleteBtn" class="btn danger" disabled>삭제</button>
        </div>
        <textarea id="viewArea" placeholder="왼쪽 목록에서 항목을 선택하면 내용이 표시됩니다." readonly></textarea>

        <div style="height:12px;"></div>

        <h2>입력</h2>
        <div class="twoCol">
          <input id="titleIn" type="text" placeholder="제목 (예: 일정/내일, 메모/장보기)" disabled />
          <div class="row" style="justify-content:flex-end;">
            <button id="saveBtn" class="btn ok" disabled>저장</button>
          </div>
        </div>
        <textarea id="bodyIn" placeholder="내용" disabled></textarea>

        <div class="hint">
          ⚠️ 비밀번호를 잊으면 복구 불가입니다. (정상적인 보안 설계)<br/>
          ⌨️ 팁: 잠금 해제 후 <span class="kbd">Ctrl+S</span>로 저장, <span class="kbd">Ctrl+C</span>는 복사 버튼과 별개로 선택 복사도 됩니다.
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // =========================
    // Storage schema (encrypted only)
    // =========================
    const STORAGE_KEY = "secretNoteData.v1";
    const ITERATIONS = 150000; // PBKDF2 반복 (너무 높으면 느림)
    const SALT_LEN = 16;
    const IV_LEN = 12;

    /** @type {{version:number, items:Array}} */
    let state = { version: 1, items: [] };

    // Session key cache (never persisted)
    let session = {
      unlocked: false,
      password: "",
      key: null, // CryptoKey for AES-GCM
      selectedId: null,
      editingId: null
    };

    // =========================
    // DOM
    // =========================
    const $ = (id) => document.getElementById(id);
    const pw = $("pw");
    const unlockBtn = $("unlockBtn");
    const lockState = $("lockState");

    const sortSel = $("sortSel");
    const list = $("list");
    const pinToggleBtn = $("pinToggleBtn");
    const newBtn = $("newBtn");

    const exportBtn = $("exportBtn");
    const importFile = $("importFile");
    const clearLocalBtn = $("clearLocalBtn");

    const selTitle = $("selTitle");
    const viewArea = $("viewArea");
    const copyBtn = $("copyBtn");
    const editBtn = $("editBtn");
    const deleteBtn = $("deleteBtn");

    const titleIn = $("titleIn");
    const bodyIn = $("bodyIn");
    const saveBtn = $("saveBtn");

    const toast = $("toast");

    function showToast(msg){
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    }

    // =========================
    // Base64 helpers
    // =========================
    function bytesToB64(bytes){
      let binary = "";
      const chunk = 0x8000;
      for (let i=0; i<bytes.length; i+=chunk){
        binary += String.fromCharCode(...bytes.subarray(i, i+chunk));
      }
      return btoa(binary);
    }

    function b64ToBytes(b64){
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i=0; i<binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    // =========================
    // Crypto: PBKDF2 -> AES-GCM key
    // =========================
    async function deriveKeyFromPassword(password, saltBytes){
      const enc = new TextEncoder();
      const baseKey = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );

      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: saltBytes,
          iterations: ITERATIONS,
          hash: "SHA-256"
        },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
      );
    }

    async function encryptText(plainText, password){
      const salt = crypto.getRandomValues(new Uint8Array(SALT_LEN));
      const iv = crypto.getRandomValues(new Uint8Array(IV_LEN));
      const key = await deriveKeyFromPassword(password, salt);

      const enc = new TextEncoder();
      const cipherBuf = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv },
        key,
        enc.encode(plainText)
      );

      return {
        salt: bytesToB64(salt),
        iv: bytesToB64(iv),
        ct: bytesToB64(new Uint8Array(cipherBuf))
      };
    }

    async function decryptText(payload, password){
      const salt = b64ToBytes(payload.salt);
      const iv = b64ToBytes(payload.iv);
      const ct = b64ToBytes(payload.ct);

      const key = await deriveKeyFromPassword(password, salt);
      const plainBuf = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv },
        key,
        ct
      );
      const dec = new TextDecoder();
      return dec.decode(plainBuf);
    }

    // =========================
    // Data I/O
    // =========================
    function loadFromLocal(){
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { version: 1, items: [] };
      try{
        const parsed = JSON.parse(raw);
        if (!parsed || parsed.version !== 1 || !Array.isArray(parsed.items)) {
          return { version: 1, items: [] };
        }
        return parsed;
      }catch{
        return { version: 1, items: [] };
      }
    }

    function saveToLocal(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function downloadJson(filename, obj){
      const blob = new Blob([JSON.stringify(obj, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    // =========================
    // UI state
    // =========================
    function setUnlocked(on){
      session.unlocked = on;
      lockState.textContent = on ? "UNLOCKED" : "LOCKED";
      lockState.style.borderColor = on ? "rgba(77,212,172,0.6)" : "var(--line)";

      // Enable/disable controls
      list.disabled = !on;
      pinToggleBtn.disabled = !on;
      newBtn.disabled = !on;
      exportBtn.disabled = !on;
      clearLocalBtn.disabled = !on;

      titleIn.disabled = !on;
      bodyIn.disabled = !on;
      saveBtn.disabled = !on;

      copyBtn.disabled = !on;
      editBtn.disabled = !on;
      deleteBtn.disabled = !on;

      if (!on){
        selTitle.textContent = "없음";
        viewArea.value = "";
        titleIn.value = "";
        bodyIn.value = "";
        session.selectedId = null;
        session.editingId = null;
        session.password = "";
        session.key = null;
      }
    }

    function sortedItems(){
      const items = [...state.items];
      const mode = sortSel.value;

      const byTitle = (a,b) => (a.title || "").localeCompare((b.title || ""), "ko");
      const byUpdatedDesc = (a,b) => (b.updatedAt || 0) - (a.updatedAt || 0);

      if (mode === "title"){
        items.sort((a,b) => {
          if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
          return byTitle(a,b);
        });
      } else if (mode === "updated"){
        items.sort((a,b) => {
          if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
          return byUpdatedDesc(a,b);
        });
      } else {
        // pinned_updated
        items.sort((a,b) => {
          if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
          return byUpdatedDesc(a,b);
        });
      }
      return items;
    }

    function renderList(){
      const items = sortedItems();
      list.innerHTML = "";
      for (const it of items){
        const opt = document.createElement("option");
        opt.value = it.id;
        opt.textContent = `${it.pinned ? "⭐ " : ""}${it.title}`;
        list.appendChild(opt);
      }

      // keep selection if possible
      if (session.selectedId){
        const exists = items.some(i => i.id === session.selectedId);
        if (exists) list.value = session.selectedId;
        else session.selectedId = null;
      }
    }

    function findItem(id){
      return state.items.find(x => x.id === id) || null;
    }

    function setSelected(id){
      session.selectedId = id;
      const item = findItem(id);
      if (!item){
        selTitle.textContent = "없음";
        viewArea.value = "";
        return;
      }
      selTitle.textContent = item.title + (item.pinned ? " ⭐" : "");
    }

    // =========================
    // Actions
    // =========================
    async function unlock(){
      const password = pw.value;
      if (!password || password.length < 4){
        showToast("비밀번호를 입력하세요. (최소 4글자 권장)");
        return;
      }

      // Load encrypted data from local
      state = loadFromLocal();

      // Quick sanity check by attempting to decrypt first item (if exists)
      // This avoids "unlocked" state with wrong password, but still allows empty state.
      if (state.items.length > 0){
        try{
          await decryptText(state.items[0].payload, password);
        }catch{
          showToast("비밀번호가 틀렸거나 데이터가 손상되었습니다.");
          return;
        }
      }

      session.password = password;
      setUnlocked(true);
      renderList();
      showToast("잠금 해제 완료");
    }

    async function onSelect(){
      const id = list.value;
      if (!id) return;
      setSelected(id);

      const item = findItem(id);
      try{
        const plain = await decryptText(item.payload, session.password);
        viewArea.value = plain;
      }catch{
        viewArea.value = "";
        showToast("복호화 실패: 비밀번호/데이터 확인 필요");
      }
    }

    async function onCopy(){
      if (!session.selectedId){
        showToast("복사할 항목을 선택하세요.");
        return;
      }
      const text = viewArea.value || "";
      if (!text){
        showToast("복사할 내용이 없습니다.");
        return;
      }
      try{
        await navigator.clipboard.writeText(text);
        showToast("복사 완료");
      }catch{
        // Fallback: select + execCommand
        viewArea.focus();
        viewArea.select();
        const ok = document.execCommand("copy");
        showToast(ok ? "복사 완료" : "복사 실패(브라우저 권한 확인)");
        viewArea.setSelectionRange(0,0);
      }
    }

    function onEdit(){
      if (!session.selectedId){
        showToast("수정할 항목을 선택하세요.");
        return;
      }
      const item = findItem(session.selectedId);
      if (!item) return;

      session.editingId = item.id;
      titleIn.value = item.title;
      bodyIn.value = viewArea.value || "";
      titleIn.focus();
      showToast("수정 모드");
    }

    async function onDelete(){
      if (!session.selectedId){
        showToast("삭제할 항목을 선택하세요.");
        return;
      }
      const item = findItem(session.selectedId);
      if (!item) return;

      const ok = confirm(`정말 삭제할까요?\n\n제목: ${item.title}\n(복구 불가)`);
      if (!ok) return;

      state.items = state.items.filter(x => x.id !== item.id);
      saveToLocal();

      session.selectedId = null;
      session.editingId = null;
      selTitle.textContent = "없음";
      viewArea.value = "";
      titleIn.value = "";
      bodyIn.value = "";

      renderList();
      showToast("삭제 완료");
    }

    async function onSave(){
      const title = (titleIn.value || "").trim();
      const body = bodyIn.value || "";

      if (!title){
        showToast("제목을 입력하세요.");
        titleIn.focus();
        return;
      }

      // If creating new but same title exists -> overwrite confirm
      const existing = state.items.find(x => x.title === title);
      const isEditing = !!session.editingId;

      if (!isEditing && existing){
        const ok = confirm(`같은 제목이 이미 있습니다.\n\n"${title}" 를 덮어쓸까요?`);
        if (!ok) return;
        session.editingId = existing.id;
      }

      const payload = await encryptText(body, session.password);
      const now = Date.now();

      if (session.editingId){
        const idx = state.items.findIndex(x => x.id === session.editingId);
        if (idx >= 0){
          const keepPinned = !!state.items[idx].pinned;
          state.items[idx] = {
            ...state.items[idx],
            title,
            payload,
            updatedAt: now,
            pinned: keepPinned
          };
        }else{
          // edge case
          state.items.push({
            id: crypto.randomUUID(),
            title,
            payload,
            pinned: false,
            updatedAt: now
          });
        }
      }else{
        state.items.push({
          id: crypto.randomUUID(),
          title,
          payload,
          pinned: false,
          updatedAt: now
        });
      }

      saveToLocal();
      renderList();

      // auto select and show
      const selected = state.items.find(x => x.title === title) || null;
      if (selected){
        session.selectedId = selected.id;
        list.value = selected.id;
        await onSelect();
      }

      session.editingId = null;
      showToast("저장 완료");
    }

    function onNew(){
      session.editingId = null;
      session.selectedId = null;
      selTitle.textContent = "없음";
      viewArea.value = "";
      titleIn.value = "";
      bodyIn.value = "";
      titleIn.focus();
      renderList();
      showToast("새 항목");
    }

    function onPinToggle(){
      if (!session.selectedId){
        showToast("핀 할 항목을 선택하세요.");
        return;
      }
      const item = findItem(session.selectedId);
      if (!item) return;

      item.pinned = !item.pinned;
      item.updatedAt = Date.now();
      saveToLocal();
      renderList();
      setSelected(item.id);
      showToast(item.pinned ? "핀 고정" : "핀 해제");
    }

    function onExport(){
      const file = {
        exportedAt: new Date().toISOString(),
        data: state
      };
      downloadJson("secret-note.data.json", file);
      showToast("내보내기 완료");
    }

    async function onImport(file){
      try{
        const text = await file.text();
        const obj = JSON.parse(text);

        const incoming = obj?.data;
        if (!incoming || incoming.version !== 1 || !Array.isArray(incoming.items)){
          showToast("불러오기 실패: 형식이 올바르지 않습니다.");
          return;
        }

        // quick decrypt test (if items exist)
        if (incoming.items.length > 0){
          try{
            await decryptText(incoming.items[0].payload, session.password);
          }catch{
            showToast("불러오기 실패: 비밀번호가 다르거나 데이터가 손상되었습니다.");
            return;
          }
        }

        state = incoming;
        saveToLocal();
        session.selectedId = null;
        session.editingId = null;
        selTitle.textContent = "없음";
        viewArea.value = "";
        titleIn.value = "";
        bodyIn.value = "";
        renderList();
        showToast("불러오기 완료");
      }catch{
        showToast("불러오기 실패: 파일을 확인하세요.");
      }
    }

    function onClearLocal(){
      const ok = confirm("로컬 데이터를 삭제할까요?\n(복구 불가, 내보내기 파일이 있다면 다시 불러올 수 있습니다)");
      if (!ok) return;

      localStorage.removeItem(STORAGE_KEY);
      state = { version: 1, items: [] };
      session.selectedId = null;
      session.editingId = null;
      selTitle.textContent = "없음";
      viewArea.value = "";
      titleIn.value = "";
      bodyIn.value = "";
      renderList();
      showToast("로컬 데이터 삭제 완료");
    }

    // =========================
    // Events
    // =========================
    unlockBtn.addEventListener("click", unlock);

    list.addEventListener("change", onSelect);
    sortSel.addEventListener("change", renderList);

    copyBtn.addEventListener("click", onCopy);
    editBtn.addEventListener("click", onEdit);
    deleteBtn.addEventListener("click", onDelete);

    saveBtn.addEventListener("click", onSave);
    newBtn.addEventListener("click", onNew);
    pinToggleBtn.addEventListener("click", onPinToggle);

    exportBtn.addEventListener("click", onExport);
    importFile.addEventListener("change", (e) => {
      const f = e.target.files?.[0];
      if (f) onImport(f);
      importFile.value = "";
    });

    clearLocalBtn.addEventListener("click", onClearLocal);

    // Keyboard shortcuts
    window.addEventListener("keydown", (e) => {
      if (!session.unlocked) return;

      // Ctrl+S to save
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s"){
        e.preventDefault();
        onSave();
      }
    });

    // Initialize locked
    setUnlocked(false);
    renderList();
  </script>
</body>
</html>
